<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Aula</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Editar Aula</h1>
        <p>Atualize as informacoes da aula selecionada.</p>

        <form method="POST">
            <div class="form-group">
                <label for="titulo">Titulo</label>
                <input id="titulo" type="text" name="titulo" value="{{ aula[1] }}" required>
            </div>

            <div class="form-group">
                <label for="url">URL ou arquivo</label>
                <input id="url" type="text" name="url" value="{{ aula[2] }}" required>
            </div>

            <div class="form-group">
                <label for="modulo_id">Modulo</label>
                <select id="modulo_id" name="modulo_id" required>
                    {% for modulo in modulos %}
                        <option
                            value="{{ modulo[0] }}"
                            {% if modulo[0] == aula[3] %}selected{% endif %}
                        >
                            {{ modulo[1] }} - {{ modulo[2] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Atualizar</button>
                <a href="/admin/aulas" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
