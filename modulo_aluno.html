<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Erro ao excluir</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="message-page">

    <main class="message-card">
        <div class="message-icon message-icon-alert">!</div>

        <h1>{{ titulo | default('Erro ao excluir') }}</h1>

        <p>{{ mensagem }}</p>

        <div class="button-row">
            <a href="{{ voltar | default('javascript:history.back()') }}" class="btn-secondary">Voltar</a>

            {% if acao_extra %}
                <a href="{{ acao_extra }}">{{ texto_acao_extra }}</a>
            {% endif %}
        </div>
    </main>

</body>
</html>
