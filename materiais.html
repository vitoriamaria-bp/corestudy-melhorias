<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="logo">

    <h1>Editar Usuário</h1>

    <form method="POST">

    <label>Nome:</label>
    <br>
    <input type="text" name="nome" value="{{ usuario[1] }}" required>

    <br><br>

    <label>Email:</label>
    <br>
    <input type="email" name="email" value="{{ usuario[2] }}" required>

    <br><br>

    <label>Telefone:</label>
    <br>
    <input type="text" name="telefone" value="{{ usuario[3] }}" required>

    <br><br>

    <label>Data de nascimento:</label>
    <br>
    <input type="date" name="data_nasc" value="{{ usuario[4] }}" required>

    <br><br>

    <label>Senha:</label>
    <br>
    <input type="text" name="senha" value="{{ usuario[5] }}" required>

    <br><br>

    <button type="submit">
        Atualizar
    </button>

    <br><br>

    <a href="/admin/usuarios">
        Voltar
    </a>

</form>

</body>
</html>
