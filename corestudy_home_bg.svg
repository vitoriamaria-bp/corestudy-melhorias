<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <style>
      .bg { fill: #f3f6fb; }
      .entity { fill: #ffffff; stroke: #bfdbfe; stroke-width: 2; }
      .title { fill: #1e40af; font: 700 18px Arial, sans-serif; }
      .field { fill: #334155; font: 14px Arial, sans-serif; }
      .rel { stroke: #3b82f6; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { fill: #475569; font: 700 13px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect class="bg" width="1180" height="760"/>
  <text x="40" y="45" class="title" style="font-size:26px">DER - Core Study</text>
  <text x="40" y="70" class="field">Modelo relacional principal usado pelo sistema Flask + MySQL</text>

  <g transform="translate(40 120)">
    <rect class="entity" width="250" height="125" rx="10"/>
    <text x="18" y="30" class="title">tbl_categoria</text>
    <text x="18" y="60" class="field">PK id_categoria</text>
    <text x="18" y="84" class="field">nome_categoria</text>
  </g>

  <g transform="translate(390 105)">
    <rect class="entity" width="290" height="165" rx="10"/>
    <text x="18" y="30" class="title">tbl_cursos</text>
    <text x="18" y="60" class="field">PK id_curso</text>
    <text x="18" y="84" class="field">titulo_curso</text>
    <text x="18" y="108" class="field">descricao_curso</text>
    <text x="18" y="132" class="field">carga_hora_curso</text>
    <text x="18" y="156" class="field">FK fk_tbl_categoria_id_categoria</text>
  </g>

  <g transform="translate(780 120)">
    <rect class="entity" width="280" height="125" rx="10"/>
    <text x="18" y="30" class="title">tbl_modulos</text>
    <text x="18" y="60" class="field">PK id_modulo</text>
    <text x="18" y="84" class="field">titulo_modulo</text>
    <text x="18" y="108" class="field">FK fk_tbl_cursos_id_curso</text>
  </g>

  <g transform="translate(780 355)">
    <rect class="entity" width="280" height="125" rx="10"/>
    <text x="18" y="30" class="title">tbl_aulas</text>
    <text x="18" y="60" class="field">PK id_aula</text>
    <text x="18" y="84" class="field">titulo_aula</text>
    <text x="18" y="108" class="field">FK fk_tbl_modulos_id_modulo</text>
  </g>

  <g transform="translate(390 355)">
    <rect class="entity" width="290" height="145" rx="10"/>
    <text x="18" y="30" class="title">tbl_materiais</text>
    <text x="18" y="60" class="field">PK id_material</text>
    <text x="18" y="84" class="field">nome_material</text>
    <text x="18" y="108" class="field">tipo_material</text>
    <text x="18" y="132" class="field">FK fk_tbl_aulas_id_aula</text>
  </g>

  <g transform="translate(40 530)">
    <rect class="entity" width="270" height="155" rx="10"/>
    <text x="18" y="30" class="title">tbl_usuarios</text>
    <text x="18" y="60" class="field">PK id_usuario</text>
    <text x="18" y="84" class="field">nome_usuario</text>
    <text x="18" y="108" class="field">email_usuario</text>
    <text x="18" y="132" class="field">senha_usuario</text>
  </g>

  <g transform="translate(390 555)">
    <rect class="entity" width="290" height="105" rx="10"/>
    <text x="18" y="30" class="title">usu_cur</text>
    <text x="18" y="60" class="field">PK/FK fk_tbl_usuarios_id_usuario</text>
    <text x="18" y="84" class="field">PK/FK fk_tbl_cursos_id_curso</text>
  </g>

  <path class="rel" d="M290 182 C330 182 345 182 390 182"/>
  <text x="315" y="170" class="label">1:N</text>

  <path class="rel" d="M680 182 C720 182 735 182 780 182"/>
  <text x="710" y="170" class="label">1:N</text>

  <path class="rel" d="M920 245 C920 290 920 315 920 355"/>
  <text x="935" y="305" class="label">1:N</text>

  <path class="rel" d="M780 420 C735 420 720 425 680 425"/>
  <text x="710" y="410" class="label">1:N</text>

  <path class="rel" d="M310 610 C340 610 355 610 390 610"/>
  <text x="333" y="598" class="label">1:N</text>

  <path class="rel" d="M535 555 C535 500 535 335 535 270"/>
  <text x="548" y="535" class="label">N:1</text>
</svg>
