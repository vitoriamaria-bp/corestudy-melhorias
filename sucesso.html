<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Core Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page home-page">

    <main class="auth-card home-card">
        <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="logo">
        <h1>Login</h1>
        <p>Acesse sua area de estudos.</p>

        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="text" name="email" placeholder="Digite seu email" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input id="senha" type="password" name="senha" placeholder="Digite sua senha" required>
            </div>

            <div class="button-row">
                <button type="submit">Entrar</button>
                <a href="/" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
