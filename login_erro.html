<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Modulo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Editar Modulo</h1>
        <p>Atualize o nome e o curso vinculado ao modulo.</p>

        <form method="POST">
            <div class="form-group">
                <label for="titulo">Titulo</label>
                <input id="titulo" type="text" name="titulo" value="{{ modulo[1] }}" required>
            </div>

            <div class="form-group">
                <label for="curso_id">Curso</label>
                <select id="curso_id" name="curso_id" required>
                    {% for curso in cursos %}
                        <option
                            value="{{ curso[0] }}"
                            {% if curso[0] == modulo[2] %}selected{% endif %}
                        >
                            {{ curso[1] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Atualizar</button>
                <a href="/admin/modulos" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
