<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Material</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Adicionar Material</h1>
        <p>Registre um material complementar para uma aula.</p>

        <form method="POST">
            <div class="form-group">
                <label for="nome">Nome do material</label>
                <input id="nome" type="text" name="nome" required>
            </div>

            <div class="form-group">
                <label for="tipo">Tipo do material</label>
                <input id="tipo" type="text" name="tipo" required>
            </div>

            <div class="form-group">
                <label for="tamanho">Tamanho do arquivo</label>
                <input id="tamanho" type="text" name="tamanho" required>
            </div>

            <div class="form-group">
                <label for="aula_id">Aula</label>
                <select id="aula_id" name="aula_id" required>
                    {% for aula in aulas %}
                        <option value="{{ aula[0] }}">{{ aula[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Cadastrar</button>
                <a href="/admin/materiais" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
