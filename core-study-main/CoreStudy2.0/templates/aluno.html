<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aluno</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="student-header">
        <div class="student-info">
            <img src="{{ url_for('static', filename='img/logo_core_study.png') }}" alt="Logo Core Study" class="student-logo">

            <div class="student-title">
                <h1>Area do Aluno</h1>
                <p>Bem-vindo, {{ nome_usuario }}!</p>
            </div>
        </div>

        <a href="/logout" class="logout-btn">Fazer Logout</a>
    </header>

    <main class="page-shell">
        <section class="item-card trail-hero-card">
            <h2>Trilha de Estudos</h2>
            <p>Acesse seus cursos, modulos, aulas e materiais em um unico lugar.</p>

            <div class="center-actions">
                <a href="/trilha">Acessar Trilha de Estudos</a>
            </div>
        </section>
    </main>

</body>
</html>
