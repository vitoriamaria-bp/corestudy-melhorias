<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Material</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Editar Material</h1>
        <p>Atualize os dados do material selecionado.</p>

        <form method="POST">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input id="nome" type="text" name="nome" value="{{ material[1] }}" required>
            </div>

            <div class="form-group">
                <label for="tipo">Tipo</label>
                <input id="tipo" type="text" name="tipo" value="{{ material[2] }}" required>
            </div>

            <div class="form-group">
                <label for="tamanho">Tamanho</label>
                <input id="tamanho" type="text" name="tamanho" value="{{ material[3] }}" required>
            </div>

            <div class="form-group">
                <label for="aula_id">Aula</label>
                <select id="aula_id" name="aula_id" required>
                    {% for aula in aulas %}
                        <option
                            value="{{ aula[0] }}"
                            {% if aula[0] == material[4] %}selected{% endif %}
                        >
                            {{ aula[1] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Atualizar</button>
                <a href="/admin/materiais" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
