<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Curso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Editar Curso</h1>
        <p>Atualize as informacoes do curso selecionado.</p>

        <form method="POST">
            <div class="form-group">
                <label for="titulo">Titulo do curso</label>
                <input id="titulo" type="text" name="titulo" value="{{ curso[1] }}" required>
            </div>

            <div class="form-group">
                <label for="descricao">Descricao do curso</label>
                <textarea id="descricao" name="descricao" required>{{ curso[2] }}</textarea>
            </div>

            <div class="form-group">
                <label for="carga_hora">Carga horaria</label>
                <input id="carga_hora" type="number" name="carga_hora" value="{{ curso[3] }}" required>
            </div>

            <div class="form-group">
                <label for="categoria_id">Categoria</label>
                <select id="categoria_id" name="categoria_id" required>
                    {% for categoria in categorias %}
                        <option
                            value="{{ categoria[0] }}"
                            {% if categoria[0] == curso[4] %}selected{% endif %}
                        >
                            {{ categoria[1] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Salvar alteracoes</button>
                <a href="/admin/cursos" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
