<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Aula</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Adicionar Aula</h1>
        <p>Cadastre uma aula e vincule-a ao modulo correto.</p>

        <form method="POST">
            <div class="form-group">
                <label for="titulo">Titulo da aula</label>
                <input id="titulo" type="text" name="titulo" required>
            </div>

            <div class="form-group">
                <label for="url">URL ou arquivo da aula</label>
                <input id="url" type="text" name="url" required>
            </div>

            <div class="form-group">
                <label for="modulo_id">Modulo</label>
                <select id="modulo_id" name="modulo_id" required>
                    {% for modulo in modulos %}
                        <option value="{{ modulo[0] }}">
                            {{ modulo[1] }} - {{ modulo[2] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Cadastrar</button>
                <a href="/admin/aulas" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
