<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="admin-page">

    <header class="admin-header">
        <div class="admin-info">
            <img
                src="{{ url_for('static', filename='img/logo_core_study.png') }}"
                alt="Logo Core Study"
                class="admin-logo"
            >

            <div class="admin-title">
                <h1>Painel Administrativo</h1>
                <p>Bem-vindo administrador!</p>
            </div>
        </div>

        <a href="/logout" class="logout-btn admin-logout">Fazer Logout</a>
    </header>

    <main class="admin-dashboard">
        <section class="admin-card admin-hero-card">
            <p class="admin-card-intro">Escolha uma área para administrar:</p>

            <div class="admin-buttons">
                <a href="/admin/cursos"><span>📚</span> Cursos</a>
                <a href="/admin/categorias"><span>🗂</span> Categorias</a>
                <a href="/admin/modulos"><span>📖</span> Módulos</a>
                <a href="/admin/aulas"><span>🎥</span> Aulas</a>
                <a href="/admin/materiais"><span>📎</span> Materiais</a>
                <a href="/admin/usuarios"><span>👤</span> Usuários</a>
            </div>
        </section>
    </main>

</body>
</html>
