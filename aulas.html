<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Modulo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

    <main class="form-card">
        <h1>Adicionar Modulo</h1>
        <p>Crie um modulo e associe-o a um curso.</p>

        <form method="POST">
            <div class="form-group">
                <label for="titulo">Titulo do modulo</label>
                <input id="titulo" type="text" name="titulo" required>
            </div>

            <div class="form-group">
                <label for="curso_id">Curso</label>
                <select id="curso_id" name="curso_id" required>
                    {% for curso in cursos %}
                        <option value="{{ curso[0] }}">{{ curso[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="button-row">
                <button type="submit">Cadastrar</button>
                <a href="/admin/modulos" class="btn-secondary">Voltar</a>
            </div>
        </form>
    </main>

</body>
</html>
